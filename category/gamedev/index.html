---
layout: default
title: "gamedev"
permalink: /category/gamedev/
---
<h1>Posts: gamedev</h1>
<ul class="posts">
  {% for post in site.categories.gamedev %}
    <li>
      <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
      <p class="post-date">{{ post.date | date: "%B %d, %Y" }}</p>
      <div class="excerpt">{{ post.excerpt }}</div>
    </li>
  {% endfor %}
</ul>
