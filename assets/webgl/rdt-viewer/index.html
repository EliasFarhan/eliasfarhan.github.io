<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RDT Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    #status {
      padding: 6px;
      font-size: 13px;
      color: #888;
    }
    canvas {
      display: block;
      border: 1px solid #333;
      width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <div id="status">Loading...</div>
  <canvas id="canvas" width="1024" height="600" oncontextmenu="event.preventDefault()"></canvas>
  <script>
    var params = new URLSearchParams(window.location.search);
    var version = params.get('version') || 'rdt10';
    var validVersions = ['rdt10','rdt20','rdt21','rdt22','rdt30','rdt40','rdt50'];
    if (validVersions.indexOf(version) === -1) version = 'rdt10';

    var statusEl = document.getElementById('status');
    var Module = {
      canvas: document.getElementById('canvas'),
      print: function(text) { console.log(text); },
      setStatus: function(text) {
        statusEl.textContent = text;
        if (!text) statusEl.style.display = 'none';
      },
      locateFile: function(path) {
        return '/assets/webgl/rdt-viewer/' + path;
      },
      monitorRunDependencies: function(left) {
        if (left) {
          Module.setStatus('Loading... (' + left + ' remaining)');
        } else {
          Module.setStatus('');
        }
      }
    };
    window.onerror = function() {
      Module.setStatus('Error - check browser console');
    };

    var script = document.createElement('script');
    script.async = true;
    script.src = '/assets/webgl/rdt-viewer/' + version + '.js';
    document.body.appendChild(script);
  </script>
</body>
</html>
